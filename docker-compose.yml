# Habit Tracker - Docker Compose Configuration
# Stack Version:
# - Web Server: Vite Dev Server (Development) / Nginx Alpine (Production)
# - Backend: Laravel 13 (PHP 8.4)
# - Frontend: React/TypeScript (Node.js 24)
# - Database: MySQL 8.0

services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:80"         # ← ganti dari 5173:5173
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-177449966877-6fpd740l4k952jpusb1hskjqc996g4bb.apps.googleusercontent.com}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-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}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - DB_HOST=mysql
      - DB_PORT=3306
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: habit_tracker
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
