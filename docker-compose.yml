# Habit Tracker - Docker Compose Configuration
# Stack Version:
# - Web Server: Nginx Alpine (Reverse Proxy)
# - Backend: Laravel 13 (PHP 8.4)
# - Frontend: React/TypeScript (Node.js 24)
# - Database: MySQL 8.0

services:
  nginx:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:80" # Frontend access
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-177449966877-6fpd740l4k952jpusb1hskjqc996g4bb.apps.googleusercontent.com}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-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}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - DB_HOST=mysql
      - DB_PORT=3306
    ports:
      - "8000:8000" # Backend API access
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: habit_tracker
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
